<head>
    <title>Your Cart - For Nature Future</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header (Same as index.html) -->
    <div class="header">
        <div class="logo">
            <a href="index.html">
                <img src="image/logo.png" alt="FNF Logo"> 
            </a>
        </div>
        <div class="delivery-time">
            <select class="location-select">
                <option disabled selected>Select Delivery Location</option>
                <option>Patna, Bihar</option>
                <option>Ranchi, Jharkhand</option>
                <option>Guntur, Andhra Pradesh</option>
                <option>Noida, Delhi</option>
                <option>Pune, Maharashtra</option>
            </select>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Shop Sustainably, Search Responsibly">
        </div>
        <div class="buttons">
            <div class="category-select">
                <select class="category-dropdown" onchange="location = this.value;">
                    <option disabled selected>Categories</option>
                    <option value="fruits.html">Fruits</option>
                    <option value="Personal product.html">Personal Care</option>
                    <option value="Medicinal plant.html">Medicinal Plant</option>
                    <option value="kitchen.html">Kitchen</option>
                </select>
            </div>
            <a href="login.html"><i class="fas fa-user"></i> Account</a>
            <a href="cart.html" class="cart"><i class="fas fa-shopping-cart"></i> <p><span id="cart-count">0</span> items</p></a>
        </div>
    </div>

    <!-- Cart Content -->
    <div class="cart-container">
        <h1>Your Shopping Cart</h1>
        <div class="cart-items" id="cart-items">
            <!-- Cart items will appear here automatically -->
            <p class="empty-cart-message">Your cart is empty</p>
        </div>
        <div class="cart-summary-container" style="display: flex; align-items: center; gap: 20px;">
            <div class="cart-summary">
                <div class="summary-details">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery:</span>
                        <span id="delivery">₹0</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">₹0</span>
                    </div>
                    <button class="checkout-btn" onclick="proceedToCheckout()">Proceed to Checkout</button>
                </div>
            </div>
            <div class="cart-summary-image">
                <img src="image\co2.png" alt="Shopping Cart" style="max-width: 500
                ; height: 270;">
            </div>
        </div>
    </div>

    <!-- Footer (Same as index.html) -->
    <div class="footer">
        <div class="footer-links">
            <a href="#">About Us</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms & Conditions</a>
        </div>
        <div class="social-media">
            <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
            <a href="https://linkedin.com" target="_blank"><i class="fab fa-linkedin"></i></a>
        </div>
        <div class="address">
            <p>For Nature Future, 123 Boring Road, Patna, BIHAR, India</p>
        </div>
        <div class="copyright">
            <p>&copy; 2025 For Nature Future. All Rights Reserved.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
